<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutList Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1916;
  --surface2: #222018;
  --border: #2e2c28;
  --border2: #3d3a34;
  --text: #e8e4dc;
  --text2: #a09890;
  --text3: #6a6460;
  --amber: #d4920a;
  --amber2: #f0b830;
  --amber-dim: rgba(212,146,10,0.12);
  --wood: #8b5e3c;
  --wood2: #c4895a;
  --green: #4a8c5c;
  --green2: #6ab87a;
  --red: #8c3a3a;
  --red2: #c45a5a;
  --blue: #3a6a8c;
  --blue2: #5a9ac4;
  --radius: 4px;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Instrument Serif', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}
